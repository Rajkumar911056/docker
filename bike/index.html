<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Website</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
        }

        header{
            background:#000;
            color:white;
            text-align:center;
            padding:20px;
        }

        nav{
            background:#222;
            text-align:center;
            padding:15px;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:15px;
            font-size:18px;
        }

        .hero{
            height:450px;
            background:url('https://images.unsplash.com/photo-1558981806-ec527fa84c39?q=80&w=1200') no-repeat center center/cover;
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
            font-size:45px;
            font-weight:bold;
        }

        .bikes{
            display:flex;
            justify-content:center;
            gap:20px;
            padding:40px;
            flex-wrap:wrap;
        }

        .card{
            background:white;
            width:280px;
            border-radius:10px;
            overflow:hidden;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
            text-align:center;
        }

        .card img{
            width:100%;
            height:200px;
            object-fit:cover;
        }

        .card h3{
            padding:15px;
        }

        .card p{
            padding:0 15px 15px;
        }

        .btn{
            display:inline-block;
            margin-bottom:20px;
            padding:10px 20px;
            background:orange;
            color:white;
            text-decoration:none;
            border-radius:5px;
        }

        footer{
            background:#111;
            color:white;
            text-align:center;
            padding:20px;
            margin-top:20px;
        }

    </style>

</head>

<body>

    <header>
        <h1>Super Bikes</h1>
        <p>Ride With Speed And Style</p>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">Bikes</a>
        <a href="#">Gallery</a>
        <a href="#">Contact</a>
    </nav>

    <div class="hero">
        Welcome To Bike World
    </div>

    <section class="bikes">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1558981806-ec527fa84c39?q=80&w=800" alt="Bike">
            <h3>Sports Bike</h3>
            <p>Fast and powerful sports bike.</p>
            <a href="#" class="btn">Buy Now</a>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1517846693594-1567da72af75?q=80&w=800" alt="Bike">
            <h3>Royal Bike</h3>
            <p>Comfortable and stylish long ride bike.</p>
            <a href="#" class="btn">Buy Now</a>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1529429617124-aee711a5ac1c?q=80&w=800" alt="Bike">
            <h3>Racing Bike</h3>
            <p>Best bike for racing lovers.</p>
            <a href="#" class="btn">Buy Now</a>
        </div>

    </section>

    <footer>
        <p>© 2026 Super Bikes | All Rights Reserved</p>
    </footer>

</body>
</html>
